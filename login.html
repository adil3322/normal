<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div class="container mt-5" style="max-width:400px">
  <h2>Login</h2>
  <input id="user" class="form-control mb-2" placeholder="Username">
  <input id="pass" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="login()" class="btn btn-success w-100">Login</button>
  <a href="./register.html" class="d-block mt-2 text-center">Register karo</a>
</div>
<script>
function login() {
  let user = document.getElementById('user').value.trim();
  let pass = document.getElementById('pass').value.trim();
  let users = JSON.parse(localStorage.getItem('users') || '[]');
  let found = users.find(u => u.username === user && u.password === pass);
  if (found) {
    localStorage.setItem('loggedIn', user);
    window.location.href = '/normal/index.html';
  } else {
    alert('Wrong username ya password!');
  }
}
</script>
</body>
</html>
