<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div class="container mt-5" style="max-width:400px">
  <h2>Register</h2>
  <input id="user" class="form-control mb-2" placeholder="Username">
  <input id="pass" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="register()" class="btn btn-primary w-100">Register</button>
  <a href="./login.html" class="d-block mt-2 text-center">Login karo</a>
</div>
<script>
function register() {
  let user = document.getElementById('user').value.trim();
  let pass = document.getElementById('pass').value.trim();
  if (!user || !pass) return alert('Sab fields bharo!');
  let users = JSON.parse(localStorage.getItem('users') || '[]');
  if (users.find(u => u.username === user)) return alert('Username already exists!');
  users.push({ username: user, password: pass });
  localStorage.setItem('users', JSON.stringify(users));
  alert('Register ho gaye! Ab login karo.');
  window.location.href = './login.html';
}
</script>
</body>
</html>
